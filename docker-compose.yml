version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./db:/app/db
      - ./dummy_data:/app/dummy_data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: rag_streamlit
    ports:
      - "8501:8501"
    depends_on:
      - backend